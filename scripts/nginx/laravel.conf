# HTTP → HTTPS redirect
server {
    listen 80;
    server_name trimibel.com www.trimibel.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name trimibel.com www.trimibel.com;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 520M;

    ssl_certificate     /etc/letsencrypt/live/trimibel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trimibel.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # /api/chat-bot/stop → /chat/cancel (FastAPI uses "cancel", not "stop")
    location = /api/chat-bot/stop {
        rewrite ^ /chat/cancel break;
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        proxy_buffering    off;
    }

    # All other /api/chat-bot/* → /chat/* (bypasses PHP-FPM for low streaming latency)
    location /api/chat-bot {
        rewrite ^/api/chat-bot(/.*)$ /chat$1 break;
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # OnlyOffice Document Server
    location ^~ /onlyoffice-ds/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.5-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 600s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
