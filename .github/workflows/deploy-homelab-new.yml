name: Homelab Continuous Deployment

on:
  push:
    branches: [feature/ci-cd] # Chạy khi push vào branch develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy Apps via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Đi tới thư mục dự án (giả sử bạn để trong /var/www)
            cd /var/www/my-project

            # 2. Cập nhật code mới nhất
            git pull origin develop

            # 3. Xử lý cho Node.js (nếu có thay đổi package.json)
            if [ -f "package.json" ]; then
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" # Load NVM
              npm install --production
              pm2 restart all || pm2 start app.js --name "web-app"
            fi

            # 4. Xử lý cho PHP (Laravel mẫu)
            if [ -f "composer.json" ]; then
              composer install --no-dev --optimize-autoloader
              php artisan migrate --force
              php artisan config:cache
            fi
