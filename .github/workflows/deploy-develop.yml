name: CI/CD → AWS EC2 (develop)

# Triggers when a PR is merged into develop
on:
  push:
    branches: [develop]

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — PHP Tests
  # ──────────────────────────────────────────────────────────
  test:
    name: PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, redis, gd, zip, bcmath, pcntl, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run database migrations (test DB)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan test --stop-on-failure

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Build Frontend Assets
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build production assets (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 3 — Deploy to AWS EC2
  # Runs only after tests pass AND frontend builds succeed
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    environment: develop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync application files to EC2
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='.env' \
            --exclude='chatbot_service/.venv' \
            --exclude='chatbot_service/var/chroma_db' \
            --exclude='ml/.venv' \
            --exclude='ml/models' \
            --exclude='whitebophir/node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/

      - name: Run deployment script on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash ${{ secrets.EC2_DEPLOY_PATH }}/scripts/deploy.sh"

      - name: Notify deployment result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMIT="${{ github.sha }}"
          SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          echo "Deployment ${STATUS} — commit ${SHORT} by ${ACTOR}"
