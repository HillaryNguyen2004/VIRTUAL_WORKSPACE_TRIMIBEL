name: CI/CD → Homelab Server (develop)

# Triggers when a PR is merged into develop
on:
  push:
    branches: [develop]

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — PHP Tests
  # ──────────────────────────────────────────────────────────
  test:
    name: PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, redis, gd, zip, bcmath, pcntl, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test environment
        run: |
          cp .env.testing .env
          php artisan key:generate

      - name: Run database migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate:fresh --force

      - name: Run PHPUnit tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan test --stop-on-failure

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Build Frontend Assets
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build production assets (Vite)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_PUSHER_APP_KEY: ${{ secrets.PUSHER_APP_KEY }}
          VITE_PUSHER_APP_CLUSTER: ${{ secrets.PUSHER_APP_CLUSTER }}
          VITE_PUSHER_HOST: ${{ secrets.PUSHER_HOST }}
          VITE_PUSHER_PORT: ${{ secrets.PUSHER_PORT }}
          VITE_PUSHER_SCHEME: ${{ secrets.PUSHER_SCHEME }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-homelab
          path: public/build/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Homelab Server
  # Runs only after tests pass AND frontend builds succeed
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Homelab
    runs-on: ubuntu-latest
    needs: [test, build-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-homelab
          path: public/build/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync application files to Homelab
        run: |
          rsync -az --delete \
            --omit-dir-times \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor/' \
            --exclude='storage/' \
            --exclude='bootstrap/cache/' \
            --exclude='.env' \
            --exclude='etl/.env' \
            --exclude='chatbot_service/.env' \
            --exclude='chatbot_service/.venv' \
            --exclude='chatbot_service/var/' \
            --exclude='ml/.venv' \
            --exclude='whitebophir/node_modules' \
            --exclude='tools/docx-converter/node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ secrets.REMOTE_DEPLOY_PATH }}/

      - name: Run deployment script on Homelab
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} \
            "PHP_BIN=php8.2 DEPLOY_USER=${{ secrets.REMOTE_USER }} REMOTE_DEPLOY_PATH=${{ secrets.REMOTE_DEPLOY_PATH }} bash ${{ secrets.REMOTE_DEPLOY_PATH }}/scripts/deploy.sh"

      - name: Notify deployment result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMIT="${{ github.sha }}"
          SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          echo "Homelab deployment ${STATUS} — commit ${SHORT} by ${ACTOR}"
